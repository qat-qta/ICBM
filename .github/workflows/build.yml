name: APK HARD LOCK BUILD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      DEBIAN_FRONTEND: noninteractive

    steps:
    # =========================
    # GET SOURCE
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # VERIFY PROJECT STRUCTURE
    # =========================
    - name: Validate project
      run: |
        set -e

        echo "Checking main.py..."
        test -f main.py

        echo "Checking buildozer.spec..."
        test -f buildozer.spec

        echo "OK"

    # =========================
    # PYTHON
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # SYSTEM DEPENDENCIES (MINIMAL STABLE SET)
    # =========================
    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          cmake \
          ninja-build \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    # =========================
    # PYTHON TOOLCHAIN (LOCKED)
    # =========================
    - name: Install toolchain
      run: |
        python -m pip install --upgrade pip setuptools wheel

        pip install buildozer==1.5.0
        pip install cython==0.29.37
        pip install python-for-android==2024.1.21

        pip install --only-binary=:all: \
          ninja==1.11.1.1 \
          meson==1.5.1

        pip install appdirs colorama jinja2 packaging toml "sh<2.0,>=1.0"

    # =========================
    # CLEAN STATE
    # =========================
    - name: Clean build
      run: |
        rm -rf .buildozer || true

    # =========================
    # BUILD (NO INIT, NO INTERACTIVE EVER)
    # =========================
    - name: Build APK
      run: |
        set -e
        yes | buildozer -v android debug

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk