name: Build APK (Stable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          cmake \
          ninja-build \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Upgrade pip tools
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Install locked Python build stack
      run: |
        pip install buildozer==1.5.0 cython==0.29.37
        pip install python-for-android==2024.1.21

        # tránh build ninja/meson từ source (rất hay crash)
        pip install --only-binary=:all: ninja meson

        pip install appdirs colorama jinja2 packaging toml "sh<2.0,>=1.0"

    - name: Ensure buildozer spec exists
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    - name: Fix buildozer permissions issue
      run: |
        mkdir -p ~/.buildozer

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk