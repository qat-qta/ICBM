name: Build APK (AUTO FIX FINAL)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      BUILDOZER_WARN_ON_ROOT: "0"
      DEBIAN_FRONTEND: noninteractive

    steps:
    # =========================
    # CHECKOUT CODE
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4

    # =========================
    # DEBUG WORKSPACE
    # =========================
    - name: Debug workspace
      run: |
        pwd
        ls -la

    # =========================
    # PYTHON SETUP
    # =========================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          cmake \
          ninja-build \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    # =========================
    # PYTHON TOOLCHAIN LOCKED
    # =========================
    - name: Install Python toolchain
      run: |
        python -m pip install --upgrade pip setuptools wheel

        pip install buildozer==1.5.0
        pip install cython==0.29.37
        pip install python-for-android==2024.1.21

        pip install --only-binary=:all: ninja==1.11.1.1 meson==1.5.1

        pip install appdirs colorama jinja2 packaging toml "sh<2.0,>=1.0"

    # =========================
    # AUTO FIX PROJECT STRUCTURE
    # =========================
    - name: Auto fix project structure
      run: |
        echo "Checking Python entry file..."

        if [ ! -f main.py ]; then
          echo "ERROR: main.py not found"
          exit 1
        fi

        echo "main.py found OK"

    # =========================
    # AUTO GENERATE BUILDOZER SPEC
    # =========================
    - name: Generate buildozer.spec if missing
      run: |
        if [ ! -f buildozer.spec ]; then
          echo "Creating buildozer.spec..."
          buildozer init
        fi

        # ensure spec exists
        if [ ! -f buildozer.spec ]; then
          echo "FAILED to create buildozer.spec"
          exit 1
        fi

        ls -la buildozer.spec

    # =========================
    # CLEAN BUILD CACHE
    # =========================
    - name: Clean build cache
      run: |
        rm -rf .buildozer || true

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        yes | buildozer -v android debug

    # =========================
    # UPLOAD APK
    # =========================
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk