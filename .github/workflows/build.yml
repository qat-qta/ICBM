name: Build APK (Docker Fixed)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: kivy/buildozer:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check environment
      run: |
        python --version
        buildozer --version

    - name: Ensure buildozer.spec
      run: |
        test -f buildozer.spec || buildozer init

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk