name: Build APK (Stable Final)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      BUILD_DEBUG: "1"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # =========================
    # SYSTEM DEPENDENCIES
    # =========================
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          cmake \
          ninja-build \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    # =========================
    # PYTHON TOOLCHAIN (LOCKED)
    # =========================
    - name: Install Python build stack
      run: |
        python -m pip install --upgrade pip setuptools wheel

        # Buildozer + Cython (đúng version ổn định)
        pip install buildozer==1.5.0 cython==0.29.37

        # KHÓA python-for-android (tránh master broken)
        pip install python-for-android==2024.1.21

        # ÉP binary packages (tránh compile CMake/ninja)
        pip install --only-binary=:all: ninja==1.11.1.1 meson==1.5.1

        # runtime deps
        pip install appdirs colorama jinja2 packaging toml "sh<2.0,>=1.0"

    # =========================
    # BUILDOZER INIT
    # =========================
    - name: Ensure buildozer.spec exists
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    # =========================
    # BUILD APK
    # =========================
    - name: Build APK
      run: |
        buildozer -v android debug

    # =========================
    # UPLOAD RESULT
    # =========================
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk