name: APK HARD LOCK BUILD

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Verify Java
    run: |
      java -version
      echo "JAVA_HOME=$JAVA_HOME"

  - name: Install system dependencies
    run: |
      sudo apt update
      sudo apt install -y \
        git \
        zip \
        unzip \
        autoconf \
        automake \
        libtool \
        pkg-config \
        cmake \
        ninja-build

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip setuptools wheel
      pip install buildozer==1.5.0 cython==0.29.37

  - name: Verify files
    run: |
      ls -la
      test -f buildozer.spec

  - name: Build APK
    run: |
      buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: apk
      path: |
        bin/*.apk
        **/*.apk
```
